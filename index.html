<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pastor (パストール) - 完全版</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #info-panel {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            background-color: #1e1e1e;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #board {
            display: grid;
            grid-template-rows: repeat(7, 1fr);
            /* 両端が半分（0.5 : 1 : 1 : 1 : 1 : 1 : 1 : 1 : 1 : 0.5） */
            grid-template-columns: 0.5fr repeat(8, 1fr) 0.5fr;
            gap: 2px;
            background-color: #444444;
            padding: 2px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 9 / 7; /* 10列(実質9列幅) x 7行の比率調整 */
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .cell {
            background-color: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            touch-action: manipulation;
        }

        /* 得点エリア（両端のハーフマス） */
        .cell.goal-left { background-color: #3a1a1a; }
        .cell.goal-right { background-color: #1a2a3a; }

        /* 選択中のハイライト */
        .cell.selected {
            outline: 3px solid #ff9800;
            outline-offset: -3px;
            z-index: 10;
        }

        .piece {
            width: 75%;
            height: 75%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s ease;
        }

        .piece.red { background-color: #ff5252; border: 2px solid #b71c1c; }
        .piece.blue { background-color: #448aff; border: 2px solid #0d47a1; }

        .ball {
            width: 45%;
            height: 45%;
            border-radius: 50%;
            background-color: #ffd700;
            border: 2px solid #ffa000;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.6);
        }

        #msg-panel {
            margin-top: 15px;
            min-height: 40px;
            color: #ff9800;
            font-weight: bold;
            text-align: center;
            max-width: 450px;
        }
    </style>
</head>
<body>

    <div id="info-panel">読み込み中...</div>
    <div id="board"></div>
    <div id="msg-panel"></div>

    <script>
        const ROWS = 7;
        const COLS = 10;

        // ゲーム状態
        // 0: 空, 1: 赤コマ(初期右側), 2: 青コマ(初期左側)
        let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        let ballPos = { r: 3, c: 8 }; // 初期位置：右から2番目の列（c=8）の中央
        let attackerSide = 1;         // 現在の攻撃側 (1:赤, 2:青)
        let currentTurnSide = 2;      // 最初の手番は守備側（青）からスタート
        let actionsLeft = 1;          // 守備側の初期アクション数は1
        let selectedPos = null;
        let lastRobbedPiece = null;   // 連続奪い返し制限用
        let gameOver = false;

        function setupGame() {
            // 守備側（青）：左から2番目の列（列インデックス1）に1マスおきに配置（計4個）
            for (let r = 0; r < ROWS; r += 2) board[r][1] = 2;
            
            // 攻撃側（赤）：右から2番目の列（列インデックス8）に1マスおきに配置（計4個）
            for (let r = 0; r < ROWS; r += 2) board[r][8] = 1;
            
            // ボールを中央（行3）の赤コマに配置
            // ※行が0,2,4,6にしか配置されないため、中央付近の行4にボールを初期配置します
            ballPos = { r: 4, c: 8 };
            attackerSide = 1;
            currentTurnSide = 2; // 守備側から
            actionsLeft = 1;
            gameOver = false;
            selectedPos = null;
            lastRobbedPiece = null;
        }

        function createBoardGUI() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    // 両端（列0と列9）を得点ゴールエリアとしてマーク
                    if (c === 0) cell.classList.add('goal-red');
                    if (c === COLS - 1) cell.classList.add('goal-blue');

                    cell.addEventListener('click', () => handleCellClick(r, c));
                    boardDiv.appendChild(cell);
                }
            }
        }

        function updateGUI() {
            if (gameOver) return;

            const info = document.getElementById('info-panel');
            const role = (currentTurnSide === attackerSide) ? "攻撃側" : "守備側";
            const sideText = (currentTurnSide === 1) ? "赤 (RED)" : "青 (BLUE)";
            const color = (currentTurnSide === 1) ? "#ff5252" : "#448aff";
            info.innerHTML = `手番: <span style="color: ${color}">${sideText} [${role}]</span><br>残り行動: ${actionsLeft}`;

            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                cell.innerHTML = '';
                cell.classList.remove('selected');

                if (selectedPos && selectedPos.r === r && selectedPos.c === c) {
                    cell.classList.add('selected');
                }

                if (board[r][c] === 1) {
                    const piece = document.createElement('div');
                    piece.classList.add('piece', 'red');
                    if (ballPos.r === r && ballPos.c === c) {
                        const ball = document.createElement('div');
                        ball.classList.add('ball');
                        piece.appendChild(ball);
                    }
                    cell.appendChild(piece);
                } else if (board[r][c] === 2) {
                    const piece = document.createElement('div');
                    piece.classList.add('piece', 'blue');
                    if (ballPos.r === r && ballPos.c === c) {
                        const ball = document.createElement('div');
                        ball.classList.add('ball');
                        piece.appendChild(ball);
                    }
                    cell.appendChild(piece);
                }
            });
        }

        function showMessage(msg, isError = false) {
            const msgPanel = document.getElementById('msg-panel');
            msgPanel.innerText = msg;
            msgPanel.style.color = isError ? "#ff5252" : "#ff9800";
            if(msg) {
                setTimeout(() => { msgPanel.innerText = ''; }, 3000);
            }
        }

        function handleCellClick(r, c) {
            if (gameOver) return;
            const clickedPiece = board[r][c];

            // パス最優先処理 (攻撃側がすでにボール持ちコマを選択しており、別の味方コマをタップしたとき)
            if (selectedPos && currentTurnSide === attackerSide) {
                if (clickedPiece === currentTurnSide && (selectedPos.r !== r || selectedPos.c !== c)) {
                    if (selectedPos.r === ballPos.r && selectedPos.c === ballPos.c) {
                        actionPass(selectedPos, { r, c });
                        selectedPos = null;
                        updateGUI();
                        return;
                    }
                }
            }

            // 1. 自分のコマを選択
            if (clickedPiece === currentTurnSide) {
                selectedPos = { r, c };
                updateGUI();
                return;
            }

            // 2. アクション実行
            if (selectedPos) {
                const dist = Math.max(Math.abs(selectedPos.r - r), Math.abs(selectedPos.c - c));

                // --- 守備側の行動 ---
                if (currentTurnSide !== attackerSide) {
                    // 奪う (ボール持ちの敵に隣接)
                    if (r === ballPos.r && c === ballPos.c && dist === 1) {
                        actionSteal(selectedPos, { r, c });
                    }
                    // 移動
                    else if (clickedPiece === 0 && dist === 1) {
                        actionMove(selectedPos, { r, c });
                    }
                } 
                // --- 攻撃側の行動 ---
                else {
                    // 移動
                    if (clickedPiece === 0 && dist === 1) {
                        actionMove(selectedPos, { r, c });
                    }
                }
                selectedPos = null;
                updateGUI();
            }
        }

        function actionMove(start, end) {
            board[end.r][end.c] = board[start.r][start.c];
            board[start.r][start.c] = 0;

            if (start.r === ballPos.r && start.c === ballPos.c) {
                ballPos = { r: end.r, c: end.c };
                if (checkVictory()) return;
            }
            finishAction();
        }

        function actionPass(start, end) {
            let isValid = false;
            if (attackerSide === 1) { // 赤：左（c=0）へ進むので、後ろは右（列番号大: end.c > start.c）
                if (end.c > start.c) isValid = true;
            } else {                  // 青：右（c=9）へ進むので、後ろは左（列番号小: end.c < start.c）
                if (end.c < start.c) isValid = true;
            }

            if (isValid) {
                ballPos = { r: end.r, c: end.c };
                finishAction();
            } else {
                const dir = (attackerSide === 1) ? "右側の列（後ろ）" : "左側の列（後ろ）";
                showMessage(`パスは【${dir}】の味方にしか出せません。`, true);
            }
        }

        function actionSteal(stealer, ball) {
            if (lastRobbedPiece && stealer.r === lastRobbedPiece.r && stealer.c === lastRobbedPiece.c) {
                showMessage("奪われた直後の同じコマでは奪い返せません。", true);
                return;
            }

            // ボール奪取成功
            ballPos = { r: stealer.r, c: stealer.c };
            lastRobbedPiece = { r: ball.r, c: ball.c };

            // 攻守交代のコアロジック：
            // 守備側が「奪う」ために1アクション消費。
            // 攻守が入れ替わり（自分が攻撃側になり）、元々の手番の上限（2アクション）が適用されます。
            // 1（奪うのに使った分） + 1（残り） = 合計2アクションとなるよう、残りアクション数を一律「1」にします。
            attackerSide = (attackerSide === 1) ? 2 : 1;
            currentTurnSide = attackerSide; 
            actionsLeft = 1; // 奪取に1消費したため、この手番内では残り1アクション

            updateGUI();
            showMessage(`ボール奪取！攻守交代、残り1アクション。`);
        }

        function finishAction() {
            actionsLeft--;
            if (actionsLeft <= 0) {
                switchTurn();
            } else {
                updateGUI();
            }
        }

        function switchTurn() {
            currentTurnSide = (currentTurnSide === 1) ? 2 : 1;
            // 攻撃側なら2回、守備側なら1回アクションを付与
            actionsLeft = (currentTurnSide === attackerSide) ? 2 : 1;

            if (currentTurnSide === attackerSide) {
                lastRobbedPiece = null; // ターンが丸ごと1周したら制限解除
            }
            updateGUI();
        }

        function checkVictory() {
            // 赤の勝利条件：一番左の端のマス（c=0）に到達
            if (attackerSide === 1 && ballPos.c === 0) {
                gameOver = true;
                document.getElementById('info-panel').innerHTML = '<span style="color:#ff5252; font-size:1.4rem;">赤 (RED) の得点！勝利！</span>';
                setTimeout(() => { alert("赤（RED）が得点しました！勝利です！"); }, 10);
                return true;
            }
            // 青の勝利条件：一番右の端のマス（c=9）に到達
            if (attackerSide === 2 && ballPos.c === COLS - 1) {
                gameOver = true;
                document.getElementById('info-panel').innerHTML = '<span style="color:#448aff; font-size:1.4rem;">青 (BLUE) の得点！勝利！</span>';
                setTimeout(() => { alert("青（BLUE）が得点しました！勝利です！"); }, 10);
                return true;
            }
            return false;
        }

        // ゲーム開始
        setupGame();
        createBoardGUI();
        updateGUI();
    </script>
</body>
</html>
