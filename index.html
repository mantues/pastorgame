<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pastor (7x10 機能追加版) - スマホ対戦</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #top-bar {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 450px;
            margin-bottom: 10px;
        }

        #undo-btn {
            background-color: #e0e0e0;
            color: #333333;
            border: none;
            padding: 8px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            touch-action: manipulation;
        }

        #undo-btn:active {
            background-color: #b0b0b0;
            transform: scale(0.95);
        }

        #info-panel {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            background-color: #1e1e1e;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #board {
            display: grid;
            grid-template-rows: repeat(10, 1fr);
            /* 両端の列（0列目と6列目）の横幅を半分(0.5fr)に設定 */
            grid-template-columns: 0.5fr repeat(5, 1fr) 0.5fr;
            gap: 2px;
            background-color: #444444;
            padding: 2px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 6 / 10;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .cell {
            background-color: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            touch-action: manipulation;
        }

        /* 両端の得点ゴールエリアの色付け */
        .cell.goal-red { background-color: #4a1a1a; }
        .cell.goal-blue { background-color: #1a2a4a; }

        /* 選択中のハイライト */
        .cell.selected {
            outline: 3px solid #ff9800;
            outline-offset: -3px;
            z-index: 10;
        }

        .piece {
            width: 75%;
            height: 75%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s ease;
        }

        .piece.red { background-color: #ff5252; border: 2px solid #b71c1c; }
        .piece.blue { background-color: #448aff; border: 2px solid #0d47a1; }

        .ball {
            width: 45%;
            height: 45%;
            border-radius: 50%;
            background-color: #ffd700;
            border: 2px solid #ffa000;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.6);
        }

        #msg-panel {
            margin-top: 15px;
            min-height: 40px;
            color: #ff9800;
            font-weight: bold;
            text-align: center;
            max-width: 450px;
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <button id="undo-btn" onclick="handleUndo()">一手戻す</button>
    </div>
    <div id="info-panel">読み込み中...</div>
    <div id="board"></div>
    <div id="msg-panel"></div>

    <script>
        const ROWS = 10;
        const COLS = 7;

        // ゲーム状態
        let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        let ballPos = { r: 4, c: 5 }; 
        let attackerSide = 1;         // 1: 赤, 2: 青
        let currentTurnSide = 2;      // 最初の手番は守備側（青）
        let actionsLeft = 1;          
        let selectedPos = null;
        let lastRobbedPiece = null;   
        let gameOver = false;

        // 履歴保存用のスタック
        let historyStack = [];

        function setupGame() {
            board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
            for (let r = 0; r < ROWS; r += 2) board[r][1] = 2; // 青
            for (let r = 0; r < ROWS; r += 2) board[r][5] = 1; // 赤
            
            ballPos = { r: 4, c: 5 };
            attackerSide = 1;
            currentTurnSide = 2; 
            actionsLeft = 1;
            gameOver = false;
            selectedPos = null;
            lastRobbedPiece = null;
            historyStack = [];
        }

        // 現在の状態をコピーして履歴に保存する
        function saveHistory() {
            const state = {
                board: board.map(row => [...row]),
                ballPos: { ...ballPos },
                attackerSide: attackerSide,
                currentTurnSide: currentTurnSide,
                actionsLeft: actionsLeft,
                lastRobbedPiece: lastRobbedPiece ? { ...lastRobbedPiece } : null
            };
            historyStack.push(state);
        }

        // 一手戻すボタンが押されたとき
        function handleUndo() {
            if (historyStack.length === 0) {
                showMessage("これ以上戻せません。");
                return;
            }
            if (gameOver) {
                // ゲーム終了時でも巻き戻せるようにフラグ解除
                gameOver = false;
            }
            
            const prevState = historyStack.pop();
            board = prevState.board;
            ballPos = prevState.ballPos;
            attackerSide = prevState.attackerSide;
            currentTurnSide = prevState.currentTurnSide;
            actionsLeft = prevState.actionsLeft;
            lastRobbedPiece = prevState.lastRobbedPiece;
            selectedPos = null;
            
            showMessage("一手戻しました。");
            updateGUI();
        }

        function createBoardGUI() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    if (c === 0) cell.classList.add('goal-red');
                    if (c === COLS - 1) cell.classList.add('goal-blue');

                    cell.addEventListener('click', () => handleCellClick(r, c));
                    boardDiv.appendChild(cell);
                }
            }
        }

        function updateGUI() {
            const info = document.getElementById('info-panel');
            if (gameOver) return;

            const role = (currentTurnSide === attackerSide) ? "攻撃側" : "守備側";
            const sideText = (currentTurnSide === 1) ? "赤 (RED)" : "青 (BLUE)";
            const color = (currentTurnSide === 1) ? "#ff5252" : "#448aff";
            info.innerHTML = `手番: <span style="color: ${color}">${sideText} [${role}]</span><br>残り行動: ${actionsLeft}`;

            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                cell.innerHTML = '';
                cell.classList.remove('selected');

                if (selectedPos && selectedPos.r === r && selectedPos.c === c) {
                    cell.classList.add('selected');
                }

                if (board[r][c] === 1) {
                    const piece = document.createElement('div');
                    piece.classList.add('piece', 'red');
                    if (ballPos.r === r && ballPos.c === c) {
                        const ball = document.createElement('div');
                        ball.classList.add('ball');
                        piece.appendChild(ball);
                    }
                    cell.appendChild(piece);
                } else if (board[r][c] === 2) {
                    const piece = document.createElement('div');
                    piece.classList.add('piece', 'blue');
                    if (ballPos.r === r && ballPos.c === c) {
                        const ball = document.createElement('div');
                        ball.classList.add('ball');
                        piece.appendChild(ball);
                    }
                    cell.appendChild(piece);
                }
            });
        }

        function showMessage(msg, isError = false) {
            const msgPanel = document.getElementById('msg-panel');
            msgPanel.innerText = msg;
            msgPanel.style.color = isError ? "#ff5252" : "#ff9800";
            if(msg) {
                setTimeout(() => { if(msgPanel.innerText === msg) msgPanel.innerText = ''; }, 3000);
            }
        }

        function handleCellClick(r, c) {
            if (gameOver) return;
            const clickedPiece = board[r][c];

            // パス判定 (味方コマをタップした場合)
            if (selectedPos && currentTurnSide === attackerSide) {
                if (clickedPiece === currentTurnSide && (selectedPos.r !== r || selectedPos.c !== c)) {
                    if (selectedPos.r === ballPos.r && selectedPos.c === ballPos.c) {
                        // パス先が両端(c=0, c=6)になることは構成上ありませんが、ルールに準拠
                        actionPass(selectedPos, { r, c });
                        selectedPos = null;
                        updateGUI();
                        return;
                    }
                }
            }

            // 1. 自分の手番のコマを選択
            if (clickedPiece === currentTurnSide) {
                selectedPos = { r, c };
                updateGUI();
                return;
            }

            // 2. 移動またはボール奪取の実行
            if (selectedPos) {
                const dist = Math.max(Math.abs(selectedPos.r - r), Math.abs(selectedPos.c - c));

                // 【新規制限ルール】ボールを持っていないコマは左端(c=0)・右端(c=6)に進入できない
                const isMovingBall = (selectedPos.r === ballPos.r && selectedPos.c === ballPos.c);
                if ((c === 0 || c === COLS - 1) && !isMovingBall) {
                    showMessage("ボールを持っていないコマは端のマスへ移動できません。", true);
                    selectedPos = null;
                    updateGUI();
                    return;
                }

                // --- 守備側の行動 ---
                if (currentTurnSide !== attackerSide) {
                    // ボールを奪う
                    if (r === ballPos.r && c === ballPos.c && dist === 1) {
                        actionSteal(selectedPos, { r, c });
                    }
                    // コマを動かす
                    else if (clickedPiece === 0 && dist === 1) {
                        actionMove(selectedPos, { r, c });
                    }
                } 
                // --- 攻撃側の行動 ---
                else {
                    // コマを動かす
                    if (clickedPiece === 0 && dist === 1) {
                        actionMove(selectedPos, { r, c });
                    }
                }
                selectedPos = null;
                updateGUI();
            }
        }

        function actionMove(start, end) {
            saveHistory(); // アクションが確定する前に歴史を保存

            board[end.r][end.c] = board[start.r][start.c];
            board[start.r][start.c] = 0;

            if (start.r === ballPos.r && start.c === ballPos.c) {
                ballPos = { r: end.r, c: end.c };
                if (checkVictory()) return;
            }
            finishAction();
        }

        function actionPass(start, end) {
            let isValid = false;
            if (attackerSide === 1) {
                if (end.c > start.c) isValid = true;
            } else {
                if (end.c < start.c) isValid = true;
            }

            if (isValid) {
                saveHistory(); // パス成功前に歴史を保存
                ballPos = { r: end.r, c: end.c };
                finishAction();
            } else {
                const dir = (attackerSide === 1) ? "右側の列（後ろ）" : "左側の列（後ろ）";
                showMessage(`パスは【${dir}】の味方にしか出せません。`, true);
            }
        }

        function actionSteal(stealer, ball) {
            if (lastRobbedPiece && stealer.r === lastRobbedPiece.r && stealer.c === lastRobbedPiece.c) {
                showMessage("ボールを奪われた直後の同じコマでは奪い返せません。", true);
                return;
            }

            saveHistory(); // ボールを奪う前に歴史を保存

            ballPos = { r: stealer.r, c: stealer.c };
            lastRobbedPiece = { r: ball.r, c: ball.c };

            attackerSide = (attackerSide === 1) ? 2 : 1;
            currentTurnSide = attackerSide;
            actionsLeft = 1; // 奪取直後は1アクション限定

            updateGUI();
            alert(`ボール奪取！ 攻守が交代し、${attackerSide === 1 ? '赤' : '青'}の攻撃です。（残りの行動は1回です）`);
        }

        function finishAction() {
            actionsLeft--;
            if (actionsLeft <= 0) {
                switchTurn();
            } else {
                updateGUI();
            }
        }

        function switchTurn() {
            currentTurnSide = (currentTurnSide === 1) ? 2 : 1;
            actionsLeft = (currentTurnSide === attackerSide) ? 2 : 1;

            if (currentTurnSide === attackerSide) {
                lastRobbedPiece = null; 
            }
            updateGUI();
        }

        function checkVictory() {
            if (attackerSide === 1 && ballPos.c === 0) {
                gameOver = true;
                document.getElementById('info-panel').innerHTML = '<span style="color:#ff5252; font-size:1.4rem;">赤 (RED) の得点！勝利！</span>';
                setTimeout(() => { alert("赤（RED）が左端に到達し、得点しました！勝利です！"); }, 10);
                return true;
            }
            if (attackerSide === 2 && ballPos.c === COLS - 1) {
                gameOver = true;
                document.getElementById('info-panel').innerHTML = '<span style="color:#448aff; font-size:1.4rem;">青 (BLUE) の得点！勝利！</span>';
                setTimeout(() => { alert("青（BLUE）が右端に到達し、得点しました！勝利です！"); }, 10);
                return true;
            }
            return false;
        }

        setupGame();
        createBoardGUI();
        updateGUI();
    </script>
</body>
</html>
